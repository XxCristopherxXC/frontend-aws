name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest

      - name: Deploy EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Autenticar Docker dentro de la EC2
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 2. Bajar la imagen más reciente
            docker pull ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest

            # 3. Limpiar el puerto 80 y contenedores antiguos
            docker stop frontend || true
            docker rm frontend || true
            
            # Matar cualquier proceso que esté usando el puerto 80 (como Apache o Nginx del sistema)
            sudo fuser -k 80/tcp || true

            # 4. Lanzar el nuevo contenedor
            docker run -d \
              --name frontend \
              -p 80:80 \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest
