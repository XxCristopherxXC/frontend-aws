name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest

      - name: Deploy EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Autenticar Docker
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 2. Bajar la nueva imagen
            docker pull ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest

            # 3. LIMPIEZA TOTAL (Evita el error de "Conflict Name")
            echo "Limpiando contenedores y puertos..."
            # Borrar el contenedor 'frontend' por nombre, sin importar su estado
            docker rm -f frontend || true
            
            # Borrar cualquier otro contenedor que esté usando el puerto 80
            docker ps -q --filter "publish=80" | xargs -r docker stop || true
            docker ps -a -q --filter "publish=80" | xargs -r docker rm -f || true
            
            # Asegurar que el puerto 80 esté libre de procesos del sistema
            sudo fuser -k 80/tcp || true

            # 4. Lanzar el nuevo contenedor
            echo "Lanzando nuevo contenedor..."
            docker run -d \
              --name frontend \
              -p 80:80 \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest
