name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        # Usamos comillas para evitar errores si la variable falla
        run: docker build -t "${{ secrets.DOCKER_USERNAME }}/frontend-app:latest" .

      - name: Push image
        run: docker push "${{ secrets.DOCKER_USERNAME }}/frontend-app:latest"

      - name: Deploy EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login en el servidor remoto también por si acaso
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            docker pull "${{ secrets.DOCKER_USERNAME }}/frontend-app:latest"
            docker stop frontend || true
            docker rm frontend || true
            docker run -d \
              --name frontend \
              -p 80:80 \
              --restart always \
              "${{ secrets.DOCKER_USERNAME }}/frontend-app:latest"
