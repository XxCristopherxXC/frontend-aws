name: Deploy Frontend

on:
  push:
    branches:
      - main  # Cambia a 'deploy' si esa es tu rama de trabajo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest .

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest

      - name: Deploy EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user # Ajustado para tu instancia AWS
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest
            docker stop frontend || true
            docker rm frontend || true
            # Corremos el contenedor en el puerto 80
            docker run -d -p 80:80 --name frontend ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest
