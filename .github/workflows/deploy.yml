name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file
        # Usamos la IP del secret para que sea dinámico
        run: |
          echo "VITE_API_URL=http://${{ secrets.EC2_HOST }}:3000" > .env

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. SOLUCIÓN AL ERROR DE PERMISOS (Socket de Docker)
            # Esto permite que ec2-user maneje docker sin el error de 'permission denied'
            sudo chmod 666 /var/run/docker.sock

            # 2. INSTALACIÓN MANUAL DE DOCKER COMPOSE (Si no existe)
            if ! command -v docker-compose &> /dev/null; then
              echo "Instalando Docker Compose..."
              sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
              sudo ln -s /usr/local/bin/docker-compose /usr/bin/docker-compose || true
            fi

            # 3. Login en Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 4. Pull de la imagen más reciente
            docker pull ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest

            # 5. Crear archivo docker-compose.yml para el Frontend
            cat <<'EOF' > docker-compose-frontend.yml
            services:
              frontend:
                image: DOCKER_IMAGE_PLACEHOLDER
                container_name: frontend
                restart: always
                ports:
                  - "80:80"
            EOF

            # Reemplazar el nombre de la imagen real en el archivo
            sed -i "s|DOCKER_IMAGE_PLACEHOLDER|${{ secrets.DOCKER_USERNAME }}/frontend-app:latest|g" docker-compose-frontend.yml

            # 6. Limpieza y Despliegue
            # Detenemos y borramos cualquier contenedor previo
            docker rm -f frontend || true
            
            # Liberamos el puerto 80 por si hay procesos colgados
            sudo fuser -k 80/tcp || true

            # Levantamos el contenedor
            docker-compose -f docker-compose-frontend.yml up -d
